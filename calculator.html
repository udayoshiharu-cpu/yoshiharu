 <!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>アパート経営 CF・返済比率シミュレーター</title>
    <style>
        body {
            font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif;
            background-color: #f5f3ef;
            color: #4a4641;
            margin: 0;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
        }

        .container {
            background-color: #ffffff;
            width: 100%;
            max-width: 500px;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        h2 {
            text-align: center;
            font-size: 1.4rem;
            margin-bottom: 25px;
            color: #3b3732;
            border-bottom: 2px solid #e0dcd3;
            padding-bottom: 10px;
        }

        .input-group {
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .input-group label {
            font-size: 0.95rem;
            font-weight: bold;
            flex: 1;
        }

        .input-wrapper {
            display: flex;
            align-items: center;
            flex: 0.6;
        }

        .input-wrapper input {
            width: 100%;
            padding: 8px 12px;
            font-size: 1rem;
            border: 1px solid #ccc;
            border-radius: 4px;
            text-align: right;
            background-color: #faf9f7;
            transition: border-color 0.3s;
        }

        .input-wrapper input:focus {
            outline: none;
            border-color: #8c7f70;
            background-color: #fff;
        }

        .input-wrapper span {
            margin-left: 10px;
            font-size: 0.9rem;
            color: #666;
            width: 20px;
        }

        button {
            width: 100%;
            padding: 12px;
            background-color: #8c7f70;
            color: #ffffff;
            border: none;
            border-radius: 4px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            margin-top: 15px;
            transition: background-color 0.3s;
        }

        button:hover {
            background-color: #73675a;
        }

        .result-box {
            margin-top: 30px;
            padding: 20px;
            background-color: #fcfbf9;
            border: 1px solid #e0dcd3;
            border-radius: 6px;
        }

        .result-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            font-size: 1.1rem;
        }

        .result-item:last-child {
            margin-bottom: 0;
            padding-top: 10px;
            border-top: 1px dashed #ccc;
        }

        .result-value {
            font-size: 1.4rem;
            font-weight: bold;
            color: #2c2a27;
        }
        
        .result-value.alert {
            color: #b05c5c;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>資金計画シミュレーター</h2>

    <div class="input-group">
        <label for="yield">物件利回り（表面）</label>
        <div class="input-wrapper">
            <input type="number" id="yield" step="0.1" value="8.0">
            <span>%</span>
        </div>
    </div>

    <div class="input-group">
        <label for="interest">借入金利（年利）</label>
        <div class="input-wrapper">
            <input type="number" id="interest" step="0.01" value="1.5">
            <span>%</span>
        </div>
    </div>

    <div class="input-group">
        <label for="period">返済期間</label>
        <div class="input-wrapper">
            <input type="number" id="period" step="1" value="20">
            <span>年</span>
        </div>
    </div>

    <div class="input-group">
        <label for="expense">経費率（対家賃）</label>
        <div class="input-wrapper">
            <input type="number" id="expense" step="1" value="25">
            <span>%</span>
        </div>
    </div>

    <div class="input-group">
        <label for="vacancy">空室率（対家賃）</label>
        <div class="input-wrapper">
            <input type="number" id="vacancy" step="1" value="10">
            <span>%</span>
        </div>
    </div>

    <button onclick="calculate()">計算する</button>

    <div class="result-box">
        <div class="result-item">
            <span>年間CF率</span>
            <span id="cf-rate" class="result-value">- %</span>
        </div>
        <div class="result-item">
            <span>返済比率</span>
            <span id="repayment-ratio" class="result-value">- %</span>
        </div>
    </div>
</div>

<script>
    function calculate() {
        const yieldRate = parseFloat(document.getElementById('yield').value) / 100;
        const interestRate = parseFloat(document.getElementById('interest').value) / 100;
        const years = parseInt(document.getElementById('period').value);
        const expenseRate = parseFloat(document.getElementById('expense').value) / 100;
        const vacancyRate = parseFloat(document.getElementById('vacancy').value) / 100;

        const propertyPrice = 1;
        const annualRent = propertyPrice * yieldRate;
        const expenseAmount = annualRent * expenseRate;
        const vacancyAmount = annualRent * vacancyRate;

        const monthlyInterest = interestRate / 12;
        const totalMonths = years * 12;
        let annualDebtService = 0;

        if (interestRate > 0) {
            const monthlyPayment = propertyPrice * (monthlyInterest * Math.pow(1 + monthlyInterest, totalMonths)) / (Math.pow(1 + monthlyInterest, totalMonths) - 1);
            annualDebtService = monthlyPayment * 12;
        } else {
            annualDebtService = propertyPrice / years;
        }

        const cashFlow = annualRent - expenseAmount - vacancyAmount - annualDebtService;
        const cfRateResult = (cashFlow / propertyPrice) * 100;
        const repaymentRatioResult = (annualDebtService / annualRent) * 100;

        const cfElement = document.getElementById('cf-rate');
        cfElement.textContent = cfRateResult.toFixed(2) + ' %';
        if (cfRateResult < 0) {
            cfElement.classList.add('alert');
        } else {
            cfElement.classList.remove('alert');
        }

        document.getElementById('repayment-ratio').textContent = repaymentRatioResult.toFixed(2) + ' %';
    }

    window.onload = calculate;
</script>

</body>
</html>
